<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハ行変換器</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background-color: #f0f2f5; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #output { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; min-height: 100px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h2>日本語ハ行変換器</h2>
    <textarea id="input" placeholder="文章を入力..."></textarea>
    <button id="convertBtn" disabled>辞書を読み込み中...</button>
    <div id="output">ここに結果が出ます。</div>

    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.1.2/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        const kuroshiro = new Kuroshiro();
        const analyzer = new KuromojiAnalyzer({
            dictPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" // スラッシュを追加
        });

        async function init() {
            try {
                await kuroshiro.init(analyzer);
                document.getElementById('convertBtn').disabled = false;
                document.getElementById('convertBtn').innerText = "ハ行にする！";
            } catch (e) {
                document.getElementById('output').innerText = "エラー: " + e;
            }
        }

        function toHagyo(text) {
            const map = {
                'あ': 'は', 'か': 'は', 'さ': 'は', 'た': 'は', 'な': 'は', 'は': 'は', 'ま': 'は', 'や': 'は', 'ら': 'は', 'わ': 'は', 'が': 'は', 'ざ': 'は', 'だ': 'は', 'ば': 'は', 'ぱ': 'は',
                'い': 'ひ', 'き': 'ひ', 'し': 'ひ', 'ち': 'ひ', 'に': 'ひ', 'ひ': 'ひ', 'み': 'ひ', 'り': 'ひ', 'ぎ': 'ひ', 'じ': 'ひ', 'ぢ': 'ひ', 'び': 'ひ', 'ぴ': 'ひ',
                'う': 'ふ', 'く': 'ふ', 'す': 'ふ', 'つ': 'ふ', 'ぬ': 'ふ', 'ふ': 'ふ', 'む': 'ふ', 'ゆ': 'ふ', 'る': 'ふ', 'ぐ': 'ふ', 'ず': 'ふ', 'づ': 'ふ', 'ぶ': 'ふ', 'ぷ': 'ふ',
                'え': 'へ', 'け': 'へ', 'せ': 'へ', 'て': 'へ', 'ね': 'へ', 'へ': 'へ', 'め': 'へ', 'れ': 'へ', 'げ': 'へ', 'ぜ': 'へ', 'で': 'へ', 'べ': 'へ', 'ぺ': 'へ',
                'お': 'ほ', 'こ': 'ほ', 'そ': 'ほ', 'と': 'ほ', 'の': 'ほ', 'ほ': 'ほ', 'も': 'ほ', 'よ': 'ほ', 'ろ': 'ほ', 'を': 'ほ', 'ご': 'ほ', 'ぞ': 'ほ', 'ど': 'ほ', 'ぼ': 'ほ', 'ぽ': 'ほ',
                'ん': 'ん', 'ぁ':'は', 'ぃ':'ひ', 'ぅ':'ふ', 'ぇ':'へ', 'ぉ':'ほ', 'っ':'ふ', 'ゃ':'は', 'ゅ':'ふ', 'ょ':'ほ'
            };
            return text.split('').map(c => map[c] || c).join('');
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const input = document.getElementById('input').value;
            const hiragana = await kuroshiro.convert(input, { to: "hiragana" });
            document.getElementById('output').innerText = toHagyo(hiragana);
        });

        init();
    </script>
</body>
</html>
